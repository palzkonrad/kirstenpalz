<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIRSTEN PALZ</title>

    <!-- AP3 SEO basics. Copy mirrors content/pages/about.json; the og:image is
         the about portrait (absolute URL — scrapers don't resolve relative
         paths), dimensions from tools/image-map.json. Hash routes are invisible
         to crawlers, so these tags describe the site as a whole — per-project
         previews would need prerendering (see DESIGN_NOTES.md). -->
    <meta name="description" content="Kirsten Palz is a conceptual artist in Berlin whose research-driven work confronts climate change, species extinction and the challenges of the Anthropocene.">
    <meta property="og:title" content="Kirsten Palz">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://palzkonrad.github.io/kirstenpalz/">
    <meta property="og:description" content="Kirsten Palz is a conceptual artist in Berlin whose research-driven work confronts climate change, species extinction and the challenges of the Anthropocene.">
    <meta property="og:image" content="https://palzkonrad.github.io/kirstenpalz/images/kirsten-palz-berlin.jpg">
    <meta property="og:image:width" content="600">
    <meta property="og:image:height" content="808">
    <meta name="twitter:card" content="summary">

    <link href="https://fonts.googleapis.com/css2?family=Helvetica+Neue:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <nav class="sidebar">
            <!-- AP3: all nav links carry real "#/…" route hrefs (see the route
                 table in script.js); the hash router renders from the URL. -->
            <div class="sidebar-header">
                <a href="#/about" class="nav-link" id="about-toggle" style="text-decoration: none; color: inherit; border: none;">
                    <h1 class="logo-text">KIRSTEN PALZ <span style="font-size: 10px; vertical-align: middle;">▼</span></h1>
                </a>
                <ul class="sub-nav-links" id="about-dropdown" style="display: none; padding-top: 15px; padding-left: 0; list-style: none;">
                    <li><a href="#/now" class="nav-link" style="font-size: 11px;">// NOW</a></li>
                    <li><a href="#/cv" class="nav-link" style="font-size: 11px;">C.V.</a></li>
                </ul>
            </div>
            <ul class="nav-links">
                <li><a href="#/" class="nav-link active">PROJECTS</a></li>
                <li><a href="#/engagement" class="nav-link">ENGAGEMENT</a></li>
                <li><a href="#/sculpture" class="nav-link">SCULPTURE AS WRITING</a></li>
                <li><a href="#/absences" class="nav-link">INVENTORY OF ABSENCES</a></li>
                <li><a href="#/ai-research" class="nav-link">A.I. ARTIFICIAL INTELLIGENCE</a></li>
                <li><a href="#/thanks" class="nav-link">THANKS</a></li>
            </ul>
        </nav>

        <!-- Main Content Area -->
        <main class="main-content">
            <header class="mobile-header">
                <h1 class="logo-text-mobile">KIRSTEN PALZ</h1>
                <button class="menu-toggle" id="menuToggle">MENU</button>
            </header>

            <div class="content-wrapper">

                <noscript><p>This website requires JavaScript to display its content.</p></noscript>

                <!-- Section: Home (Directory) -->
                <section id="home" class="content-section active">
                    <div class="section-header">
                        <h2>PROJECTS</h2>
                        <div class="header-line"></div>
                    </div>

                    <!-- Rendered from content/projects.json (array order = display order) -->
                    <div class="brutalist-list" id="projects-list"></div>
                </section>

                <!-- Section: Engagement -->
                <section id="engagement" class="content-section">
                    <div class="section-header">
                        <h2>ENGAGEMENT</h2>
                        <div class="header-line"></div>
                    </div>

                    <!-- Rendered from content/engagement.json (array order = display order) -->
                    <div class="brutalist-list" id="engagement-list"></div>
                </section>

                <!-- Section: Dynamic Project Detail -->
                <section id="project-detail" class="content-section">
                    <button class="back-btn" id="backToDirectory">
                        <span class="arrow">←</span> BACK TO DIRECTORY
                    </button>

                    <div class="section-header" style="margin-top: 40px;">
                        <h2 id="detail-title">PROJECT TITLE</h2>
                        <div class="header-line"></div>
                    </div>

                    <div class="project-content">
                        <div class="brutalist-post" id="detail-description">
                            <p>Loading project description...</p>
                        </div>

                        <div class="project-images" id="detail-images">
                            <!-- Images will be injected here via JS -->
                        </div>
                    </div>
                </section>



            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
